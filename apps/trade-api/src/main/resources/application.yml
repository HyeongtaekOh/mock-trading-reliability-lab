spring:
  application:
    name: trade-api
  datasource:
    url: jdbc:mysql://localhost:3306/tradinglab
    username: app
    password: app
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: trade-api

app:
  risk:
    base-url: http://localhost:8081
    connect-timeout-ms: 200
    read-timeout-ms: 300
