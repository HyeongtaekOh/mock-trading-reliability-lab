spring:
  application:
    name: execution-worker
  datasource:
    url: jdbc:mysql://localhost:3306/tradinglab
    username: app
    password: app
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: execution-worker-v1

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: execution-worker
