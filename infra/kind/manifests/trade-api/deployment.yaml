apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trade-api
  template:
    metadata:
      labels:
        app: trade-api
    spec:
      containers:
        - name: trade-api
          image: mock-trading/trade-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
